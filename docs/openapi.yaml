openapi: 3.1.0
info:
  title: compile-pdf
  description: The only writer in the Print With Synergy stack.
  version: 0.7.0
paths:
  /v1/healthz:
    get:
      summary: Healthz
      description: 'Liveness + identity + version-skew readout.


        Per spec §1.11a — extends codex''s HealthResponse with producer,

        instance_id, codex versions, and ``version_skew`` boolean derived

        from comparing compiled-against vs live Codex section versions.

        Compile''s contract guard (§1.11c) consumes this on the client side.'
      operationId: healthz_v1_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/version:
    get:
      summary: Version Endpoint
      operationId: version_endpoint_v1_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /v1/readyz:
    get:
      summary: Readyz
      description: 'Readiness probe — Phase F of the cross-stack architecture audit

        (lint-pdf/AUDIT.md finding #15). Equivalent to /healthz today;

        future hook point for downstream readiness (codex_pdf availability,

        cache backend reachability, Ghostscript subprocess pool warmth).'
      operationId: readyz_v1_readyz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Readyz V1 Readyz Get
  /v1/contract:
    get:
      summary: Contract Endpoint
      description: 'Per spec §6.2 — exposes the full contract surface so callers can

        pin against ``producer_schema_versions`` and ``codex_section_versions``.


        Mirrors codex-pdf''s GET /v1/contract pattern verbatim.'
      operationId: contract_endpoint_v1_contract_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractResponse'
  /v1/rewrite/apply:
    post:
      tags:
      - rewrite
      summary: Rewrite Apply
      description: 'Apply a rewrite plan to an inline base64-encoded PDF.


        Verification (spec §2.3 — three layers) runs server-side before the

        response is returned. A failed verify is a 500 — the plan was valid

        but the engine produced output that doesn''t satisfy the post-conditions.'
      operationId: rewrite_apply_v1_rewrite_apply_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewriteApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewriteApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/marks/apply:
    post:
      tags:
      - marks
      summary: Marks Apply
      description: 'Stamp a marks template over an inline base64-encoded PDF.


        Verification (spec §2.3 four layers) runs server-side before the

        response is returned. A failed verify is a 500 — the template was

        valid but the engine produced output that doesn''t satisfy the

        post-conditions.'
      operationId: marks_apply_v1_marks_apply_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarksApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarksApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/marks/apply-multipart:
    post:
      tags:
      - marks
      summary: Marks Apply Multipart
      description: 'Stamp a marks template that may include ``external`` marks.


        External files arrive as separate multipart parts; the engine

        resolves each ``ExternalMark.file`` against the uploaded part with

        that name. Unknown external references (no matching part) → 422.'
      operationId: marks_apply_multipart_v1_marks_apply_multipart_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_marks_apply_multipart_v1_marks_apply_multipart_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarksApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/marks/validate:
    post:
      tags:
      - marks
      summary: Validate Marks Template
      description: 'Validate a marks template shape without applying it to a PDF.


        Parses the template JSON, resolves any $expr values against synthetic

        page geometry (A4 at 72dpi), and returns the resolved mark count.

        Scripted marks are resolved against dummy geometry so callers can verify

        expression syntax before submitting a real PDF.'
      operationId: validate_marks_template_v1_marks_validate_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '422':
          description: Invalid marks template or expression error
  /v1/impose/apply:
    post:
      tags:
      - impose
      summary: Impose Apply
      description: 'Impose an inline base64-encoded PDF onto sheets per the plan.


        Pass ``?async=true`` to enqueue the job on Celery and receive a ``202``

        ``AsyncJobAccepted`` response. Poll ``GET /v1/jobs/{job_id}`` until the

        status is ``complete`` or ``failed``.'
      operationId: impose_apply_v1_impose_apply_post
      parameters:
      - name: async
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Async
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImposeApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImposeApplyResponse'
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobAccepted'
          description: Accepted
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/trap/apply:
    post:
      tags:
      - trap
      summary: Trap Apply
      description: 'Apply a trap policy to an inline base64-encoded PDF.


        Pass ``?async=true`` to enqueue the job on Celery and receive a ``202``

        ``AsyncJobAccepted`` response. Poll ``GET /v1/jobs/{job_id}`` until the

        status is ``complete`` or ``failed``.'
      operationId: trap_apply_v1_trap_apply_post
      parameters:
      - name: async
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Async
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrapApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrapApplyResponse'
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobAccepted'
          description: Accepted
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/trap/preview:
    post:
      tags:
      - trap
      summary: Trap Preview
      description: 'Compute trap operations against ``payload`` and return metadata only —

        no ``output_pdf_b64`` and no retention persistence.


        Used by the editor''s background trap-preview overlay so the UI can show

        where trap regions will land without waiting on (or paying egress for) a

        full PDF rewrite. The underlying analysis is the same code path as

        ``/v1/trap/apply``; callers wanting bit-exact preview must still submit the

        apply request.'
      operationId: trap_preview_v1_trap_preview_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrapApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrapPreviewResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/soft-proof/apply:
    post:
      tags:
      - soft-proof
      summary: Soft Proof Apply
      description: 'Simulate the input PDF under the destination ICC profile.


        The current engine is a passthrough (see

        :mod:`compile_pdf.soft_proof.engine`); the response shape is

        final. Once the real LCMS-based simulator lands the only

        visible change to callers is that the ΔE summary becomes

        meaningfully larger for mismatched profile pairs.'
      operationId: soft_proof_apply_v1_soft_proof_apply_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoftProofApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoftProofApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/white-underbase/apply:
    post:
      tags:
      - white-underbase
      summary: White Underbase Apply
      description: 'Generate a white / underbase plate per the request policy.


        Today''s engine is a passthrough (see

        :mod:`compile_pdf.white_underbase.engine`); the response shape

        is final. Once the real tracer lands the only visible change

        to callers is that ``output_pdf_b64`` differs from the input

        when the policy selects any pages.'
      operationId: white_underbase_apply_v1_white_underbase_apply_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhiteUnderbaseApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhiteUnderbaseApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/cjd/apply:
    post:
      tags:
      - cjd
      summary: Cjd Apply
      description: 'Execute a CJD job: orchestrate the four producers in dependency

        order, persist lineage records, return the final PDF + chain.


        Pass ``?async=true`` to enqueue the job on Celery and receive a ``202``

        ``AsyncJobAccepted`` response. Poll ``GET /v1/jobs/{job_id}`` until the

        status is ``complete`` or ``failed``.'
      operationId: cjd_apply_v1_cjd_apply_post
      parameters:
      - name: async
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Async
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CjdJob'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CjdApplyResponse'
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobAccepted'
          description: Accepted
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/cjd/apply-xml:
    post:
      tags:
      - cjd
      summary: Cjd Apply Xml
      description: 'XML-encoded variant of POST /v1/cjd/apply.


        Body is a CJD XML envelope (per :mod:`compile_pdf.cjd.xml`); the

        response shape matches the JSON endpoint exactly. Useful for

        operators integrating Compile into JDF / PJTF pipelines that

        already speak XML on the wire.'
      operationId: cjd_apply_xml_v1_cjd_apply_xml_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CjdApplyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lineage/{lineage_id}:
    get:
      tags:
      - lineage
      summary: Lineage Get
      description: Fetch a lineage chain by id.
      operationId: lineage_get_v1_lineage__lineage_id__get
      parameters:
      - name: lineage_id
        in: path
        required: true
        schema:
          type: string
          title: Lineage Id
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Lineage Get V1 Lineage  Lineage Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lineage:
    get:
      tags:
      - lineage
      summary: Lineage List
      description: List known lineage ids (best-effort; backend may paginate).
      operationId: lineage_list_v1_lineage_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/retention/delete:
    post:
      tags:
      - retention
      summary: Retention Delete
      description: 'Delete every retention object whose key contains the given sha256.


        Always returns 200 with a count and the deleted keys; zero hits

        is not an error (matches the spec: "any matching key", which may

        be none). Misconfiguration (no bucket) → 503; boto3 errors → 500.'
      operationId: retention_delete_v1_retention_delete_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionDeleteRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/spots/search:
    get:
      tags:
      - spots
      summary: Search the PANTONE catalogue
      description: 'Substring + library search over codex-pdf''s catalogue.


        Empty / missing ``q`` returns the first ``limit`` entries; useful

        for an initial "browse" view in the editor''s SwatchesPicker.'
      operationId: search_v1_spots_search_get
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Substring match on normalized name.
          title: Q
        description: Substring match on normalized name.
      - name: library
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter to one sub-library.
          title: Library
        description: Filter to one sub-library.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/spots/lookup:
    get:
      tags:
      - spots
      summary: Exact lookup by canonical name
      description: 'Resolve a canonical name to a :class:`SpotEntry`.


        Uses :func:`codex_pdf.color.lookup_pantone_spot` which falls back

        to the alternate-key form (``PANTONE 485 C`` ↔ ``PANTONE 485C``).'
      operationId: lookup_v1_spots_lookup_get
      parameters:
      - name: name
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          title: Name
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpotEntry'
        '404':
          description: Unknown PANTONE name
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/spots/libraries:
    get:
      tags:
      - spots
      summary: List the sub-libraries in the catalogue
      description: 'Enumerate the sub-libraries (Formula Guide Coated, Color

        Bridge Uncoated, etc.) with per-library entry counts.


        Returned in declaration order from the loaded reference. ``id``

        matches the ``library`` filter accepted by ``/search``.'
      operationId: libraries_v1_spots_libraries_get
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibrariesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/separations/list:
    post:
      tags:
      - separations
      summary: Enumerate named separations in an input PDF
      description: 'Walk every page of ``req.input_pdf_b64`` and return one entry

        per distinct named separation.


        Process colors (DeviceCMYK / DeviceGray / ICCBased) are NOT

        enumerated — only named separations declared via ``/Separation``

        or ``/DeviceN`` color-space arrays in ``/Resources/ColorSpace``.'
      operationId: list_endpoint_v1_separations_list_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeparationsListRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeparationsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/stream/apply:
    post:
      tags:
      - stream
      summary: Stream Apply
      description: "Run the named producer's engine and stream the resulting PDF.\n\nErrors map as:\n\
        \  - 400 if the producer name is unknown or the payload doesn't\n    carry a valid ``input_pdf_b64``\
        \ / schema-validated body.\n  - 422 if the underlying engine rejects an otherwise valid\n    payload\
        \ (e.g. trap policy references unknown separations).\n  - 500 if the engine produced bytes that\
        \ don't pass the\n    wrapper-level verify (no PDF header, empty output) — at\n    that point\
        \ the producer's own verify is suspect."
      operationId: stream_apply_v1_stream_apply_post
      parameters:
      - name: _modes
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: ' Modes'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamApplyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AsyncJobAccepted:
      properties:
        job_id:
          type: string
          title: Job Id
        status:
          type: string
          title: Status
          default: pending
        poll_url:
          type: string
          title: Poll Url
      type: object
      required:
      - job_id
      - poll_url
      title: AsyncJobAccepted
      description: 202 response for accepted async jobs.
    BleedMark:
      properties:
        type:
          type: string
          const: bleed
          title: Type
        anchor:
          type: string
          enum:
          - bleed_top_left
          - bleed_top_right
          - bleed_bottom_left
          - bleed_bottom_right
          - bleed_corners
          title: Anchor
        length_pt:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/ExprValue'
          title: Length Pt
          default: 9.0
        offset_pt:
          type: number
          minimum: 0.0
          title: Offset Pt
          default: 3.0
        line_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Width Pt
          default: 0.25
      additionalProperties: false
      type: object
      required:
      - type
      - anchor
      title: BleedMark
      description: 'Bleed-extent corner indicator. Same shape as crop but anchored

        against the bleed box.'
    Body_marks_apply_multipart_v1_marks_apply_multipart_post:
