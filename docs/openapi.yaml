        The full per-pixel ΔE map is too heavy for the JSON envelope —

        artwork-pdf editor renders it from a separately fetched

        ImageData / PNG, not from this response. These three numbers

        are enough to drive the footer chip on the soft-proof overlay.'
    ExplicitPlacement:
      properties:
        source_ref:
          type: string
          title: Source Ref
          description: Solver back-reference — sift's Job.id, optionally with a ':pageIdx' suffix. Informational
            for the engine; carried into lineage so a placed cell can be traced to its source job.
        x0_pt:
          type: number
          title: X0 Pt
          description: Lower-left x of the cell box in sheet-space points.
        y0_pt:
          type: number
          title: Y0 Pt
          description: Lower-left y of the cell box in sheet-space points.
        x1_pt:
          type: number
          title: X1 Pt
          description: Upper-right x of the cell box in sheet-space points.
        y1_pt:
          type: number
          title: Y1 Pt
          description: Upper-right y of the cell box in sheet-space points.
        rotation:
          type: number
          title: Rotation
          description: Cell rotation in degrees, counter-clockwise (PDF convention).
          default: 0.0
        flip_h:
          type: boolean
          title: Flip H
          description: Mirror the cell content about its vertical axis.
          default: false
        flip_v:
          type: boolean
          title: Flip V
          description: Mirror the cell content about its horizontal axis.
          default: false
        row:
          anyOf:
          - type: integer
          - type: 'null'
          title: Row
          description: Grid row index, informational. Optional — sift omits it for nest layouts.
        col:
          anyOf:
          - type: integer
          - type: 'null'
          title: Col
          description: Grid column index, informational. Optional — sift omits it for nest layouts.
      additionalProperties: false
      type: object
      required:
      - source_ref
      - x0_pt
      - y0_pt
      - x1_pt
      - y1_pt
      title: ExplicitPlacement
      description: 'One pre-solved cell position in sheet space.


        Emitted by sift-pdf''s solver (stagger / gang / nest tiers) and

        consumed by the impose engine when a uniform grid can''t express the

        layout. The box (``x0_pt``/``y0_pt``/``x1_pt``/``y1_pt``) plus

        ``rotation`` + ``flip_h`` / ``flip_v`` mirror codex''s ``CellPlacement``

        vocabulary so the engine''s per-cell transform path is identical to

        the grid path. Field names + types match sift-pdf''s handoff dict

        (``sift_pdf.handoff.compile._explicit_plan``) exactly so the dict

        validates without translation.'
