          - repeat
          title: Page Mapping
          default: sequential
        back_side:
          type: string
          enum:
          - none
          - work-and-turn
          - work-and-tumble
          title: Back Side
          default: none
        registration_marks:
          type: boolean
          title: Registration Marks
          description: When true, place four-color registration targets in the reserved ``marks_zone``
            corners. Wave 1 plumb-only — the engine accepts the field but mark rendering ships in a follow-up
            once the upstream codex marks API stabilizes; until then the toggle round-trips through the
            policy without producing visible output.
          default: false
        crop_marks:
          type: boolean
          title: Crop Marks
          description: 'When true, place crop marks at the per-cell trim corners. Same plumb-only semantics
            as ``registration_marks``: the schema carries the operator''s intent end-to-end for editor
            UIs and lineage records, with engine rendering deferred to a follow-up.'
          default: false
        explicit_placements:
          anyOf:
          - items:
              $ref: '#/components/schemas/ExplicitPlacement'
            type: array
          - type: 'null'
          title: Explicit Placements
          description: Pre-solved sheet-space cell positions from an upstream solver (sift-pdf stagger
            / gang / nest). When present, the engine places cells at these exact boxes instead of computing
            a uniform grid via ``codex_pdf.geom.tile_grid``; the grid knobs (``gutter``, ``cell_rotation``,
            ``flip_per_row``) are ignored. ``None`` (the default) preserves the prior grid behaviour exactly
            — this field is purely additive.
        stagger_mode:
          type: string
          enum:
          - none
          - half-drop-x
          - half-drop-y
          - custom
          title: Stagger Mode
          description: 'Records the solver''s stagger intent (half-drop / brick / custom) so it survives
            into lineage. Informational for the engine: when ``explicit_placements`` is set the resolved
            coordinates already carry the offset; this field preserves the *semantic* intent that would
            otherwise be lost once positions are flattened. Defaults to ``none`` (uniform grid).'
          default: none
      additionalProperties: false
      type: object
      required:
      - sheet
      - cell
      title: ImposePlan
      description: 'Sheet-level step-and-repeat plan — schema-versioned, fully forward-

        compatible with codex''s GEOM_SCHEMA_VERSION 1.1.0 surface.'
