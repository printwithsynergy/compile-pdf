      - anchor
      title: InkKeyBar
      description: 'Densitometric step wedge — ``zones`` evenly-spaced cells along

        the chosen slug edge. Each cell renders an outlined rectangle (no

        fill — that is the operator''s responsibility once they assign

        densities).'
    InkPairRule:
      properties:
        from_ink:
          type: string
          minLength: 1
          title: From Ink
          description: Source ink name (PMS / process).
        to_ink:
          type: string
          minLength: 1
          title: To Ink
          description: Adjacent ink name across the boundary.
        width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Width Pt
          description: Trap width in PDF points.
        direction:
          type: string
          enum:
          - spread
          - choke
          - auto
          title: Direction
          default: auto
      additionalProperties: false
      type: object
      required:
      - from_ink
      - to_ink
      - width_pt
      title: InkPairRule
      description: 'Per-ordered-ink-pair trap rule.


        ``direction=''auto''`` defers to neutral-density defaults: the ink

        with lower neutral density spreads into the one with higher (i.e.

        the lighter spreads into the darker). When operator override is

        explicit, ``direction`` is honored regardless of densities.'
    LibrariesResponse:
      properties:
        libraries:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Libraries
      additionalProperties: false
      type: object
      required:
      - libraries
      title: LibrariesResponse
      description: Library enumeration response.
    LineageListResponse:
      properties:
        lineage_ids:
          items:
            type: string
          type: array
          title: Lineage Ids
      additionalProperties: false
      type: object
      required:
      - lineage_ids
      title: LineageListResponse
    MarksApplyRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
        template:
          $ref: '#/components/schemas/MarksTemplate'
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      - template
      title: MarksApplyRequest
      description: 'Request envelope: an inline base64-encoded PDF + a template.


        Bytes-in / bytes-out. Lineage records persist to the configured S3

        bucket asynchronously and are addressable by the returned

        ``cache_key`` (Phase 5 lights up the actual store).


        External-file marks are not supported through the inline JSON

        transport — they require a multipart upload variant (Phase 2.x).

        Templates that include ``{"type": "external", ...}`` are rejected

        here with ``422 external_marks_not_supported_inline``.'
    MarksApplyResponse:
      properties:
        output_pdf_b64:
          type: string
          title: Output Pdf B64
        pdf_sha256:
          type: string
          title: Pdf Sha256
        input_sha256:
          type: string
          title: Input Sha256
        template_sha256:
          type: string
          title: Template Sha256
        cache_key:
          type: string
          title: Cache Key
        cache_hit:
          type: boolean
          title: Cache Hit
          default: false
        marks_applied:
          type: integer
          title: Marks Applied
        schema_version:
          type: string
          title: Schema Version
          default: 1.1.0
        compile_version:
          type: string
          title: Compile Version
          default: 0.1.1
      additionalProperties: false
      type: object
      required:
      - output_pdf_b64
      - pdf_sha256
      - input_sha256
      - template_sha256
      - cache_key
      - marks_applied
      title: MarksApplyResponse
    MarksTemplate:
      properties:
        schema_version:
          type: string
          const: 1.0.0
          title: Schema Version
          description: Bumps when the template-document schema changes (per producer; spec §6.2).
          default: 1.0.0
        marks:
          items:
            oneOf:
            - $ref: '#/components/schemas/RegisterMark'
            - $ref: '#/components/schemas/CropMark'
            - $ref: '#/components/schemas/BleedMark'
            - $ref: '#/components/schemas/ColorBar'
            - $ref: '#/components/schemas/FoldMark'
            - $ref: '#/components/schemas/CenterMark'
            - $ref: '#/components/schemas/SlugText'
            - $ref: '#/components/schemas/ProofSlug'
            - $ref: '#/components/schemas/CutMark'
            - $ref: '#/components/schemas/InkKeyBar'
            - $ref: '#/components/schemas/TileStitchMark'
            - $ref: '#/components/schemas/StepRepeatMark'
            - $ref: '#/components/schemas/CustomShape'
            - $ref: '#/components/schemas/ExternalMark'
            discriminator:
              propertyName: type
              mapping:
                bleed: '#/components/schemas/BleedMark'
                center: '#/components/schemas/CenterMark'
                color_bar: '#/components/schemas/ColorBar'
                crop: '#/components/schemas/CropMark'
                custom: '#/components/schemas/CustomShape'
                cut: '#/components/schemas/CutMark'
                external: '#/components/schemas/ExternalMark'
                fold: '#/components/schemas/FoldMark'
                ink_key_bar: '#/components/schemas/InkKeyBar'
                proof_slug: '#/components/schemas/ProofSlug'
                register: '#/components/schemas/RegisterMark'
                slug_text: '#/components/schemas/SlugText'
                step_repeat: '#/components/schemas/StepRepeatMark'
                tile_stitch: '#/components/schemas/TileStitchMark'
          type: array
          title: Marks
      additionalProperties: false
      type: object
      title: MarksTemplate
      description: 'Top-level marks-template document — schema-versioned, ordered list

        of marks. Marks render in declaration order; later marks paint over

        earlier marks at the same coordinates.'
    MarksZoneSpec:
      properties:
        top_pt:
          type: number
          minimum: 0.0
          title: Top Pt
          default: 0.0
        right_pt:
          type: number
          minimum: 0.0
          title: Right Pt
          default: 0.0
        bottom_pt:
          type: number
          minimum: 0.0
          title: Bottom Pt
          default: 0.0
        left_pt:
          type: number
          minimum: 0.0
          title: Left Pt
          default: 0.0
      additionalProperties: false
      type: object
      title: MarksZoneSpec
      description: 'Reserved sheet margins consumed by the marks layer (slug, color

        bars, etc.). Forwarded into ``codex_pdf.geom.MarksZone`` at engine

        time. The ``Spec`` suffix avoids shadowing the Codex type — the

        consume-surface audit flags any Compile-side class that re-declares

        a Codex type name.'
    MetadataSetOp:
      properties:
        op:
          type: string
          const: metadata_set
          title: Op
        key:
          type: string
          enum:
          - Title
          - Author
          - Subject
          - Keywords
          - Creator
          - Producer
          - CreationDate
          - ModDate
          title: Key
        value:
          type: string
          title: Value
      additionalProperties: false
      type: object
      required:
      - op
      - key
      - value
      title: MetadataSetOp
    MetadataStripOp:
      properties:
        op:
          type: string
          const: metadata_strip
          title: Op
        keys:
          items:
            type: string
            enum:
            - Title
            - Author
            - Subject
            - Keywords
            - Creator
            - Producer
            - CreationDate
            - ModDate
          type: array
          minItems: 1
          title: Keys
      additionalProperties: false
      type: object
      required:
      - op
      - keys
      title: MetadataStripOp
    NormalizePageTreeOp:
      properties:
        op:
          type: string
          const: normalize_page_tree
          title: Op
      additionalProperties: false
      type: object
      required:
      - op
      title: NormalizePageTreeOp
    OcgFlipOp:
      properties:
        op:
          type: string
          const: ocg_flip
          title: Op
        layer:
          type: string
          minLength: 1
          title: Layer
          description: OCG layer name (matches CodexOCG.name).
        visible:
          type: boolean
          title: Visible
      additionalProperties: false
      type: object
      required:
      - op
      - layer
      - visible
      title: OcgFlipOp
    PageDeleteOp:
      properties:
        op:
          type: string
          const: page_delete
          title: Op
        at_index:
          type: integer
          minimum: 0.0
          title: At Index
      additionalProperties: false
      type: object
      required:
      - op
      - at_index
      title: PageDeleteOp
    PageInsertOp:
      properties:
        op:
          type: string
          const: page_insert
          title: Op
        at_index:
          type: integer
          minimum: 0.0
          title: At Index
          description: 0-based index where the new page is inserted.
        width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Width Pt
        height_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Height Pt
      additionalProperties: false
      type: object
      required:
      - op
      - at_index
      - width_pt
      - height_pt
      title: PageInsertOp
    PageLabelSetOp:
      properties:
        op:
          type: string
          const: page_label_set
          title: Op
        start_index:
          type: integer
          minimum: 0.0
          title: Start Index
          description: 0-based index where this label range begins.
        style:
          type: string
          enum:
          - D
          - R
          - r
          - A
          - a
          - none
          title: Style
          description: 'PDF page-label style: D (decimal), R/r (Roman upper/lower), A/a (alpha upper/lower),
            or ''none'' to drop the entry.'
        prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Prefix
        start:
          type: integer
          minimum: 1.0
          title: Start
          default: 1
      additionalProperties: false
      type: object
      required:
      - op
      - start_index
      - style
      title: PageLabelSetOp
    PageReorderOp:
      properties:
        op:
          type: string
          const: page_reorder
          title: Op
        order:
          items:
            type: integer
            minimum: 0.0
          type: array
          minItems: 1
          title: Order
          description: Permutation of original page indices. Length must equal page count.
      additionalProperties: false
      type: object
      required:
      - op
      - order
      title: PageReorderOp
    PageRotateOp:
      properties:
        op:
          type: string
          const: page_rotate
          title: Op
        at_index:
          type: integer
          minimum: 0.0
          title: At Index
        degrees:
          type: integer
          enum:
          - 0
          - 90
          - 180
          - 270
          title: Degrees
      additionalProperties: false
      type: object
      required:
      - op
      - at_index
      - degrees
      title: PageRotateOp
    PdfxPinOp:
      properties:
        op:
          type: string
          const: pdfx_pin
          title: Op
        level:
          type: string
          enum:
          - PDF/X-1a
          - PDF/X-3
          - PDF/X-4
          - PDF/X-6
          - none
          title: Level
      additionalProperties: false
      type: object
      required:
      - op
      - level
      title: PdfxPinOp
    ProducerCreatorStampOp:
      properties:
        op:
          type: string
          const: producer_creator_stamp
          title: Op
        producer:
          anyOf:
          - type: string
          - type: 'null'
          title: Producer
        creator:
          anyOf:
          - type: string
          - type: 'null'
          title: Creator
      additionalProperties: false
      type: object
      required:
      - op
      title: ProducerCreatorStampOp
    ProofSlug:
      properties:
        type:
          type: string
          const: proof_slug
          title: Type
        inset_pt:
          type: number
          minimum: 0.0
          title: Inset Pt
          default: 0.0
        line_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Width Pt
          default: 0.5
      additionalProperties: false
      type: object
      required:
      - type
      title: ProofSlug
      description: 'Single-cell proofing border — rectangle outlining the trim with

        a configurable inset. One per page.'
    RegisterMark:
      properties:
        type:
          type: string
          const: register
          title: Type
        anchor:
          type: string
          enum:
          - trim_top_left
          - trim_top_right
          - trim_bottom_left
          - trim_bottom_right
          - trim_corners
          title: Anchor
        offset_pt:
          type: number
          minimum: 0.0
          title: Offset Pt
          default: 6.0
        line_length_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Length Pt
          default: 6.0
        line_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Width Pt
          default: 0.25
      additionalProperties: false
      type: object
      required:
      - type
      - anchor
      title: RegisterMark
      description: 'Cross-hair register mark — corner alignment target for plate

        registration. Renders a ``+`` centered ``offset_pt`` outside the

        chosen trim corner.'
    RetentionDeleteRequest:
      properties:
        sha256:
          type: string
          maxLength: 64
          minLength: 64
          pattern: ^[0-9a-fA-F]{64}$
          title: Sha256
      additionalProperties: false
      type: object
      required:
      - sha256
      title: RetentionDeleteRequest
    RetentionDeleteResponse:
      properties:
        deleted:
          type: integer
          title: Deleted
        keys:
          items:
            type: string
          type: array
          title: Keys
      additionalProperties: false
      type: object
      required:
      - deleted
      - keys
      title: RetentionDeleteResponse
    RewriteApplyRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
        plan:
          $ref: '#/components/schemas/RewritePlan'
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      - plan
      title: RewriteApplyRequest
      description: 'Request envelope: an inline base64-encoded PDF + a plan.


        Bytes-in / bytes-out. Lineage records persist to the configured S3

        bucket asynchronously and are addressable by the returned

        ``cache_key`` (Phase 5 lights up the actual store).'
    RewriteApplyResponse:
      properties:
        output_pdf_b64:
          type: string
          title: Output Pdf B64
        pdf_sha256:
          type: string
          title: Pdf Sha256
        input_sha256:
          type: string
          title: Input Sha256
        plan_sha256:
          type: string
          title: Plan Sha256
        cache_key:
          type: string
          title: Cache Key
        cache_hit:
          type: boolean
          title: Cache Hit
          default: false
        ops_applied:
          type: integer
          title: Ops Applied
        schema_version:
          type: string
          title: Schema Version
          default: 1.0.0
        compile_version:
          type: string
          title: Compile Version
          default: 0.1.1
      additionalProperties: false
      type: object
      required:
      - output_pdf_b64
      - pdf_sha256
      - input_sha256
      - plan_sha256
      - cache_key
      - ops_applied
      title: RewriteApplyResponse
      description: 'Response envelope. Output bytes are returned base64 so the

        transport stays JSON; bypassed by the streaming variant in Phase 1.x.'
    RewritePlan:
      properties:
        schema_version:
          type: string
          const: 1.0.0
          title: Schema Version
          description: Bumps when the plan-document schema changes (per producer; spec §6.2).
          default: 1.0.0
        ops:
          items:
            oneOf:
            - $ref: '#/components/schemas/OcgFlipOp'
            - $ref: '#/components/schemas/PageInsertOp'
            - $ref: '#/components/schemas/PageDeleteOp'
            - $ref: '#/components/schemas/PageReorderOp'
            - $ref: '#/components/schemas/PageRotateOp'
            - $ref: '#/components/schemas/BoxSetOp'
            - $ref: '#/components/schemas/PageLabelSetOp'
            - $ref: '#/components/schemas/NormalizePageTreeOp'
            - $ref: '#/components/schemas/MetadataSetOp'
            - $ref: '#/components/schemas/MetadataStripOp'
            - $ref: '#/components/schemas/ColorspaceSwapOp'
            - $ref: '#/components/schemas/StripJavascriptOp'
            - $ref: '#/components/schemas/StripEmbeddedFilesOp'
            - $ref: '#/components/schemas/PdfxPinOp'
            - $ref: '#/components/schemas/ProducerCreatorStampOp'
            discriminator:
              propertyName: op
              mapping:
                box_set: '#/components/schemas/BoxSetOp'
                colorspace_swap: '#/components/schemas/ColorspaceSwapOp'
                metadata_set: '#/components/schemas/MetadataSetOp'
                metadata_strip: '#/components/schemas/MetadataStripOp'
                normalize_page_tree: '#/components/schemas/NormalizePageTreeOp'
                ocg_flip: '#/components/schemas/OcgFlipOp'
                page_delete: '#/components/schemas/PageDeleteOp'
                page_insert: '#/components/schemas/PageInsertOp'
                page_label_set: '#/components/schemas/PageLabelSetOp'
                page_reorder: '#/components/schemas/PageReorderOp'
                page_rotate: '#/components/schemas/PageRotateOp'
                pdfx_pin: '#/components/schemas/PdfxPinOp'
                producer_creator_stamp: '#/components/schemas/ProducerCreatorStampOp'
                strip_embedded_files: '#/components/schemas/StripEmbeddedFilesOp'
                strip_javascript: '#/components/schemas/StripJavascriptOp'
          type: array
          title: Ops
      additionalProperties: false
      type: object
      title: RewritePlan
      description: 'A rewrite plan — schema-versioned, ordered list of operations.


        Operations execute in order; later ops see the document state produced

        by earlier ops.'
    SearchResponse:
      properties:
        results:
          items:
            $ref: '#/components/schemas/SpotEntry'
          type: array
          title: Results
        total:
          type: integer
          title: Total
          description: Number of catalogue entries that matched the query (pre-limit).
        limit:
          type: integer
          title: Limit
      additionalProperties: false
      type: object
      required:
      - results
      - total
      - limit
      title: SearchResponse
      description: Search response envelope.
    SeparationEntry:
      properties:
        name:
          type: string
          title: Name
        color_space:
          type: string
          title: Color Space
          description: One of "Separation", "DeviceN".
        occurs_on_pages:
          items:
            type: integer
          type: array
          title: Occurs On Pages
          description: 0-indexed page numbers on which this ink appears.
      additionalProperties: false
      type: object
      required:
      - name
      - color_space
      - occurs_on_pages
      title: SeparationEntry
      description: One named ink found in the input PDF.
    SeparationsListRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
          description: Base64-encoded PDF bytes.
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      title: SeparationsListRequest
      description: Request envelope for ``POST /v1/separations/list``.
    SeparationsListResponse:
      properties:
        separations:
          items:
            $ref: '#/components/schemas/SeparationEntry'
          type: array
          title: Separations
        total:
          type: integer
          title: Total
          description: Number of distinct named inks discovered.
      additionalProperties: false
      type: object
      required:
      - separations
      - total
      title: SeparationsListResponse
      description: Response envelope for ``POST /v1/separations/list``.
    Sheet:
      properties:
        width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Width Pt
        height_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Height Pt
      additionalProperties: false
      type: object
      required:
      - width_pt
      - height_pt
      title: Sheet
      description: Output sheet dimensions in points.
    SlugText:
      properties:
        type:
          type: string
          const: slug_text
          title: Type
        anchor:
          type: string
          enum:
          - slug_top
          - slug_bottom
          title: Anchor
        text:
          anyOf:
          - type: string
          - $ref: '#/components/schemas/ExprValue'
          title: Text
        font_size_pt:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/ExprValue'
          title: Font Size Pt
          default: 8.0
        offset_pt:
          type: number
          minimum: 0.0
          title: Offset Pt
          default: 3.0
      additionalProperties: false
      type: object
      required:
      - type
      - anchor
      - text
      title: SlugText
      description: 'Operator metadata strip — single line of text along the slug.

        Font is the standard PDF Helvetica face (no embedding).'
    SoftProofApplyRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
        source_icc_b64:
          type: string
          minLength: 1
          title: Source Icc B64
          description: Source ICC profile bytes, base64-encoded.
        destination_icc_b64:
          type: string
          minLength: 1
          title: Destination Icc B64
          description: Destination ICC profile bytes, base64-encoded.
        options:
          $ref: '#/components/schemas/SoftProofOptions'
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      - source_icc_b64
      - destination_icc_b64
      title: SoftProofApplyRequest
      description: 'Request envelope.


        The two ICC profiles are passed inline as base64 so callers

        don''t need to upload them ahead of time; the engine hashes

        each profile''s bytes into the cache key so subsequent

        identical requests hit cache.'
    SoftProofApplyResponse:
      properties:
        output_pdf_b64:
          type: string
          title: Output Pdf B64
        pdf_sha256:
          type: string
          title: Pdf Sha256
        input_sha256:
          type: string
          title: Input Sha256
        options_sha256:
          type: string
          title: Options Sha256
        source_icc_sha256:
          type: string
          title: Source Icc Sha256
        destination_icc_sha256:
          type: string
          title: Destination Icc Sha256
        cache_key:
          type: string
          title: Cache Key
        cache_hit:
          type: boolean
          title: Cache Hit
          default: false
        delta_e:
          $ref: '#/components/schemas/DeltaESummary'
        schema_version:
          type: string
          title: Schema Version
        compile_version:
          type: string
          title: Compile Version
      additionalProperties: false
      type: object
      required:
      - output_pdf_b64
      - pdf_sha256
      - input_sha256
      - options_sha256
      - source_icc_sha256
      - destination_icc_sha256
      - cache_key
      - delta_e
      - schema_version
      - compile_version
      title: SoftProofApplyResponse
      description: 'Response envelope.


        Field names mirror the trap / impose / marks producers so

        operator tooling can treat every producer''s response the same

        way (lineage extraction, cache-key recording, etc.).'
    SoftProofOptions:
      properties:
        intent:
          type: string
          enum:
          - perceptual
          - relative-colorimetric
          - saturation
          - absolute-colorimetric
          title: Intent
          description: ICC rendering intent applied during the simulation. Defaults to relative-colorimetric
            — the conventional choice for print soft-proofing because it preserves in-gamut colours and
            clips out-of-gamut ones.
          default: relative-colorimetric
        black_point_compensation:
          type: boolean
          title: Black Point Compensation
          description: Apply black-point compensation. Almost always desired for print proofing; exposed
            because Wave 2 PR-6's C5 overlay surfaces it as a checkbox in the soft-proof controls.
          default: true
        delta_e_formula:
          type: string
          enum:
          - cie76
          - cie94
          - ciede2000
          title: Delta E Formula
          description: Distance formula used when computing the per-pixel ΔE summary. CIEDE2000 is the
            modern default; CIE76 is retained for parity with legacy proofing reports.
          default: ciede2000
      additionalProperties: false
      type: object
      title: SoftProofOptions
      description: 'Per-request options for the soft-proof simulation.


        These are the knobs an artwork-pdf editor host might want to

        expose; profile bytes themselves live on the surrounding

        request envelope so the cache key can hash them independently

        from the rest of the options object.'
    SpotEntry:
      properties:
        name:
          type: string
          title: Name
        library:
          anyOf:
          - type: string
          - type: 'null'
          title: Library
        lab:
          anyOf:
          - prefixItems:
            - type: number
            - type: number
            - type: number
            type: array
            maxItems: 3
            minItems: 3
          - type: 'null'
          title: Lab
        cmyk_bridge:
          anyOf:
          - prefixItems:
            - type: number
            - type: number
            - type: number
            - type: number
            type: array
            maxItems: 4
            minItems: 4
          - type: 'null'
          title: Cmyk Bridge
        lab_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Lab Source
        cmyk_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Cmyk Source
      additionalProperties: false
      type: object
      required:
      - name
      title: SpotEntry
      description: 'Wire shape for one PANTONE entry. Mirrors

        :class:`codex_pdf.color.PantoneEntry` but as a Pydantic model so

        FastAPI can validate the response envelope.'
    StepRepeatMark:
      properties:
        type:
          type: string
          const: step_repeat
          title: Type
        rows:
          type: integer
          exclusiveMinimum: 0.0
          title: Rows
          default: 1
        cols:
          type: integer
          exclusiveMinimum: 0.0
          title: Cols
          default: 1
        gutter_pt:
          type: number
          minimum: 0.0
          title: Gutter Pt
          default: 0.0
        stagger:
          type: string
          enum:
          - none
          - half_drop
          - brick
          title: Stagger
          default: none
        tick_length_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Tick Length Pt
          default: 9.0
        offset_pt:
          type: number
          minimum: 0.0
          title: Offset Pt
          default: 3.0
        line_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Width Pt
          default: 0.25
      additionalProperties: false
      type: object
      required:
      - type
      title: StepRepeatMark
      description: 'Step-and-repeat (SNR) cut marks for a ganged sheet — cut ticks at the

        boundaries between repeated cells, on all four sides of the trim.


        ``rows`` x ``cols`` cells tile the trim box, separated by ``gutter_pt``.

        ``stagger`` follows a *half-drop* (alternating columns dropped by half a

        cell) or *brick* (alternating rows shifted right by half a cell)

        step-and-repeat, so the edge cut marks land where the staggered cells

        actually cut: brick shifts the top-edge ticks by half a cell (the top row''s

        offset); half-drop shifts the right-edge ticks (the last column''s drop).

        Cell tiling is plain arithmetic on the trim ``Box`` — no codex hop needed.'
    StreamApplyRequest:
      properties:
        producer:
          type: string
          enum:
          - rewrite
          - marks
          - impose
          - trap
          - soft_proof
          title: Producer
          description: 'Which producer''s engine to invoke. Must be one of: rewrite, marks, impose, trap,
            soft_proof.'
        payload:
          additionalProperties: true
          type: object
          title: Payload
          description: The underlying producer's request body, identical to what you would POST to /v1/{producer}/apply.
      additionalProperties: false
      type: object
      required:
      - producer
      - payload
      title: StreamApplyRequest
      description: 'Envelope POSTed to ``/v1/stream/apply``.


        Tagged-union discrimination on the ``producer`` field routes to

        one of the per-producer payload models. Pydantic enforces the

        payload matches the named producer''s request schema.'
    StripEmbeddedFilesOp:
      properties:
        op:
          type: string
          const: strip_embedded_files
          title: Op
      additionalProperties: false
      type: object
      required:
      - op
      title: StripEmbeddedFilesOp
    StripJavascriptOp:
      properties:
        op:
          type: string
          const: strip_javascript
          title: Op
      additionalProperties: false
      type: object
      required:
      - op
      title: StripJavascriptOp
    TileStitchMark:
      properties:
        type:
          type: string
          const: tile_stitch
          title: Type
        edge:
          type: string
          enum:
          - top
          - bottom
          - left
          - right
          title: Edge
        pitch_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Pitch Pt
          default: 72.0
        length_pt:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/ExprValue'
          title: Length Pt
          default: 6.0
        line_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Line Width Pt
          default: 0.25
      additionalProperties: false
      type: object
      required:
      - type
      - edge
      title: TileStitchMark
      description: 'Large-format stitching guide — repeated small tickmarks along the

        chosen edge at a fixed pitch.'
    TrapApplyRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
        policy:
          $ref: '#/components/schemas/TrapPolicy'
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      - policy
      title: TrapApplyRequest
      description: 'Request envelope: an inline base64-encoded PDF + a trap policy.'
    TrapApplyResponse:
      properties:
        output_pdf_b64:
          type: string
          title: Output Pdf B64
        pdf_sha256:
          type: string
          title: Pdf Sha256
        input_sha256:
          type: string
          title: Input Sha256
        policy_sha256:
          type: string
          title: Policy Sha256
        cache_key:
          type: string
          title: Cache Key
        cache_hit:
          type: boolean
          title: Cache Hit
          default: false
        engine:
          type: string
          title: Engine
        engine_fingerprint:
          type: string
          title: Engine Fingerprint
        operations_count:
          type: integer
          title: Operations Count
        trap_diff:
          additionalProperties: true
          type: object
          title: Trap Diff
        trap_findings:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Trap Findings
          description: One CodexFinding per trap operation — ecosystem-consumable detection records.
        schema_version:
          type: string
          title: Schema Version
          default: 1.0.0
        compile_version:
          type: string
          title: Compile Version
          default: 0.1.1
      additionalProperties: false
      type: object
      required:
      - output_pdf_b64
      - pdf_sha256
      - input_sha256
      - policy_sha256
      - cache_key
      - engine
      - engine_fingerprint
      - operations_count
      - trap_diff
      title: TrapApplyResponse
    TrapPolicy:
      properties:
        schema_version:
          type: string
          const: 1.0.0
          title: Schema Version
          description: Bumps when the policy-document schema changes (per producer; spec §6.2).
          default: 1.0.0
        default_trap_width_pt:
          type: number
          exclusiveMinimum: 0.0
          title: Default Trap Width Pt
          default: 0.144
        ink_pair_rules:
          items:
            $ref: '#/components/schemas/InkPairRule'
          type: array
          title: Ink Pair Rules
        trap_zones:
          items:
            $ref: '#/components/schemas/TrapZone'
          type: array
          title: Trap Zones
        delta_e_tolerance:
          type: number
          exclusiveMinimum: 0.0
          title: Delta E Tolerance
          description: Max acceptable CIEDE2000 delta_e between the trapping ink and either ink pair partner.
            Operations exceeding tolerance fail verify Layer 6 but still emit a diff record.
          default: 5.0
        neutral_density_source:
          type: string
          enum:
          - codex_extract
          - operator
          title: Neutral Density Source
          description: Source for per-ink neutral density used to resolve 'auto' spread/choke direction.
            'codex_extract' uses Lab L* values from the codex spot-color resolver (including AI Lab enrichment
            for unknown inks). 'operator' requires explicit direction on all ink_pair_rules; 'auto' pairs
            with no rule fall back to RGB-luminance approximation.
          default: codex_extract
        spread_choke:
          type: string
          enum:
          - auto
          - spread
          - choke
          title: Spread Choke
          description: Global spread/choke default applied to all zones whose ink_pair_rule direction
            is 'auto' (or that have no ink_pair_rule). 'auto' defers to neutral-density logic (lighter
            ink spreads). 'spread' or 'choke' forces the direction for all auto-resolved pairs — useful
            when the operator knows their press always spreads or always chokes regardless of density.
          default: auto
        engine:
          type: string
          enum:
          - auto
          - pure_python
          - ghostscript
          - external
          title: Engine
          description: auto → COMPILE_TRAP_ENGINE env var → pure_python. Override only when the operator
            wants a specific engine fingerprint locked into the lineage record.
          default: auto
        output_trap_layer:
          type: boolean
          title: Output Trap Layer
          description: When true, wrap trap content in an OCG named 'Traps' so PDF viewers can toggle
            the layer on/off.
          default: true
        trap_zones_source:
          type: string
          enum:
          - policy
          - codex_extract
          title: Trap Zones Source
          description: When 'codex_extract', fetch AI-detected ink-boundary candidates from the codex
            document identified by codex_job_id and merge them into the effective zone list. Declared
            trap_zones still augment/override codex zones. Requires codex_job_id to be set.
          default: policy
        codex_job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Codex Job Id
          description: 'Codex document_id to read trap_zone_candidates from when trap_zones_source=''codex_extract''.
            The codex API URL is resolved from CODEX_API_URL (default: http://localhost:8001).'
        auto_detect_zones:
          type: boolean
          title: Auto Detect Zones
          description: When true and no trap zones remain after all other resolution (policy declaration
            + codex_extract), automatically detect candidate ink-adjacency zones from the PDF's content
            stream using the conservative extractor. Set false to suppress auto-detection and run only
            against explicitly declared zones.
          default: true
      additionalProperties: false
      type: object
      title: TrapPolicy
      description: Top-level trap-policy document — schema-versioned envelope.
    TrapPreviewResponse:
      properties:
        input_sha256:
          type: string
          title: Input Sha256
        policy_sha256:
          type: string
          title: Policy Sha256
        cache_key:
          type: string
          title: Cache Key
        engine:
          type: string
          title: Engine
        engine_fingerprint:
          type: string
          title: Engine Fingerprint
        operations_count:
          type: integer
          title: Operations Count
        trap_diff:
          additionalProperties: true
          type: object
          title: Trap Diff
        trap_findings:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Trap Findings
          description: Same shape as TrapApplyResponse.trap_findings — one CodexFinding per operation.
        schema_version:
          type: string
          title: Schema Version
          default: 1.0.0
        compile_version:
          type: string
          title: Compile Version
          default: 0.1.1
      additionalProperties: false
      type: object
      required:
      - input_sha256
      - policy_sha256
      - cache_key
      - engine
      - engine_fingerprint
      - operations_count
      - trap_diff
      title: TrapPreviewResponse
      description: 'Metadata-only sibling of :class:`TrapApplyResponse` — what the

        ``POST /v1/trap/preview`` endpoint returns.


        Same trap-analysis fields, no ``output_pdf_b64`` / ``pdf_sha256``. Used by

        D1 (artwork-pdf editor''s background trap-preview overlay) to display where

        traps will land without paying the PDF egress cost on every change.'
    TrapZone:
      properties:
        page_index:
          type: integer
          minimum: 0.0
          title: Page Index
        rect_pt:
          anyOf:
          - prefixItems:
            - type: number
            - type: number
            - type: number
            - type: number
            type: array
            maxItems: 4
            minItems: 4
          - type: 'null'
          title: Rect Pt
          description: (llx, lly, urx, ury) in points; must satisfy llx<urx, lly<ury.
        polygon_pt:
          anyOf:
          - items:
              prefixItems:
              - type: number
              - type: number
              type: array
              maxItems: 2
              minItems: 2
            type: array
          - type: 'null'
          title: Polygon Pt
          description: Closed CCW ring of (x, y) vertices in PDF points. At least three vertices required;
            the engine implicitly closes the ring back to the first vertex.
        from_ink:
          type: string
          minLength: 1
          title: From Ink
        to_ink:
          type: string
          minLength: 1
          title: To Ink
      additionalProperties: false
      type: object
      required:
      - page_index
      - from_ink
      - to_ink
      title: TrapZone
      description: "One trap target on a specific page.\n\nTwo shapes are supported:\n\n* **Rectangle**\
        \ — set ``rect_pt`` only. The engine uses codex's\n  polygon_offset fast-path (no pyclipr required).\n\
        * **Polygon** — set ``polygon_pt`` to a closed counter-clockwise\n  ring of ``(x, y)`` vertices\
        \ in PDF points. The engine routes the\n  offset through ``compile_pdf.trap._geom_fallback`` because\n\
        \  codex_pdf 1.7.0's polygon_offset rejects non-rect paths on\n  pyclipr 0.1.8 — temporary upstream\
        \ workaround.\n\nExactly one of ``rect_pt`` / ``polygon_pt`` must be set; the\nschema's ``model_validator``\
        \ enforces that."
    ValidateRequest:
      properties:
        template:
          additionalProperties: true
          type: object
          title: Template
      additionalProperties: false
      type: object
      required:
      - template
      title: ValidateRequest
      description: Request for template validation — raw dict validated inside the handler.
    ValidateResponse:
      properties:
        valid:
          type: boolean
          title: Valid
        mark_count:
          type: integer
          title: Mark Count
      additionalProperties: false
      type: object
      required:
      - valid
      - mark_count
      title: ValidateResponse
      description: Result of a successful template validation.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VersionResponse:
      properties:
        version:
          type: string
          title: Version
      type: object
      required:
      - version
      title: VersionResponse
    WhiteUnderbaseApplyRequest:
      properties:
        input_pdf_b64:
          type: string
          minLength: 1
          title: Input Pdf B64
        policy:
          $ref: '#/components/schemas/WhiteUnderbasePolicy'
      additionalProperties: false
      type: object
      required:
      - input_pdf_b64
      title: WhiteUnderbaseApplyRequest
      description: 'Request envelope.


        Mirrors the trap / soft-proof / impose request shape: input PDF

        inline as base64, policy as a typed Pydantic object.'
    WhiteUnderbaseApplyResponse:
      properties:
        output_pdf_b64:
          type: string
          title: Output Pdf B64
        pdf_sha256:
          type: string
          title: Pdf Sha256
        input_sha256:
          type: string
          title: Input Sha256
        policy_sha256:
          type: string
          title: Policy Sha256
        cache_key:
          type: string
          title: Cache Key
        cache_hit:
          type: boolean
          title: Cache Hit
          default: false
        summary:
          $ref: '#/components/schemas/WhiteUnderbaseSummary'
        schema_version:
          type: string
          title: Schema Version
        compile_version:
          type: string
          title: Compile Version
      additionalProperties: false
      type: object
      required:
      - output_pdf_b64
      - pdf_sha256
      - input_sha256
      - policy_sha256
      - cache_key
      - summary
      - schema_version
      - compile_version
      title: WhiteUnderbaseApplyResponse
      description: 'Response envelope.


        Mirrors the soft-proof / trap response shape so operator

        tooling can treat every producer the same way.'
    WhiteUnderbasePolicy:
      properties:
        separation_name:
          type: string
          maxLength: 64
          minLength: 1
          title: Separation Name
          description: Name of the new DeviceN separation to add to the output PDF. Conventionally 'White'
            for white ink, 'Underbase' for screen printing, 'Varnish' for spot UV, or 'Foil' for foil-stamp
            masks.
          default: White
        plate_use:
          type: string
          enum:
          - white
          - underbase
          - varnish
          - foil
          title: Plate Use
          description: Semantic role of the plate. Affects DeviceN colorant metadata so downstream RIPs
            treat the plate correctly.
          default: white
        strategy:
          type: string
          enum:
          - auto
          - union
          - knockout
          - manual
          title: Strategy
          description: How to derive the plate from existing ink coverage. See :data:`GenerationStrategy`
            for the strategy catalogue.
          default: auto
        knockout_threshold_pct:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Knockout Threshold Pct
          description: Minimum cumulative CMYK ink coverage (%, 0-100) to trigger white plate deposition
            under 'auto' / 'knockout' strategies. 5% is the practical floor for most flexo / offset workflows;
            lower values risk noise from rasterized anti-aliasing edges.
          default: 5.0
        choke_pt:
          type: number
          maximum: 2.0
          minimum: -2.0
          title: Choke Pt
          description: Shrink (negative) or grow (positive) the generated white plate by this many points
            relative to the source geometry. Used to compensate for press misregistration; 0pt is the
            default (exact match). Typical print-shop values are -0.3pt for white-under-colour, +0.5pt
            for underbase-with-bleed.
          default: 0.0
        page_indices:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Page Indices
          description: Restrict generation to these 0-indexed pages. None means every page in the input
            PDF gets a white plate. Useful when a multi-page job has only some pages printing on dark
            substrate.
      additionalProperties: false
      type: object
      title: WhiteUnderbasePolicy
      description: 'Generation policy controlling the white-plate output.


        All knobs are optional with sensible defaults; the most common

        real-world request is ``{"separation_name": "White"}`` with

        everything else inherited.'
    WhiteUnderbaseSummary:
      properties:
        pages_processed:
          type: integer
          minimum: 0.0
          title: Pages Processed
          description: Number of pages a white plate was added to.
        separation_name:
          type: string
          title: Separation Name
          description: Name the separation was registered under in the output PDF.
        plate_use:
          type: string
          enum:
          - white
          - underbase
          - varnish
          - foil
          title: Plate Use
          description: Semantic role recorded on the separation.
        strategy_applied:
          type: string
          enum:
          - auto
          - union
          - knockout
          - manual
          title: Strategy Applied
          description: Strategy actually applied (matches the request).
      additionalProperties: false
      type: object
      required:
      - pages_processed
      - separation_name
      - plate_use
      - strategy_applied
      title: WhiteUnderbaseSummary
      description: 'Engine-side telemetry surfaced on the response so callers

        can show ''how much white did this generate?'' in the editor UI.'
