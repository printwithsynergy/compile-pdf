name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.4.20"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Consume-surface audit (spec §7.5)
        run: uv run python scripts/consume_surface_audit.py

      - name: Pytest with coverage
        run: uv run pytest --cov=compile_pdf --cov-report=term-missing --cov-fail-under=70

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: consume-surface-audit
          path: reports/audit/consume_surface.json
          if-no-files-found: ignore

  security:
    name: security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.4.20"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Semgrep (security-audit + secrets)
        run: |
          pip install semgrep==1.165.0 --quiet
          semgrep scan --error --config p/security-audit --config p/secrets --config p/python src

      - name: Bandit (medium severity + confidence)
        run: |
          uv run pip install bandit --quiet
          uv run bandit -r src --severity-level medium --confidence-level medium
