name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Consume-surface audit (spec §7.5)
        run: uv run python scripts/consume_surface_audit.py

      - name: Pytest with coverage
        run: uv run pytest --cov=compile_pdf --cov-report=term-missing --cov-fail-under=70

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consume-surface-audit
          path: reports/audit/consume_surface.json
          if-no-files-found: ignore
